name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Build APK (Release)
        run: flutter build apk --release

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freelance-assistant-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK to GoFile
        run: |
          RESPONSE=$(curl -F "file=@build/app/outputs/flutter-apk/app-release.apk" https://store1.gofile.io/contents/uploadfile)
          echo "GoFile Response: $RESPONSE"
          DOWNLOAD_URL=$(echo $RESPONSE | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('data',{}).get('downloadPage','N/A'))")
          echo "## 📱 APK Download Link" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[Download APK]($DOWNLOAD_URL)**" >> $GITHUB_STEP_SUMMARY
          echo "Download URL: $DOWNLOAD_URL"

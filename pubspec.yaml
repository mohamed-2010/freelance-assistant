name: freelance_assistant
description: A personal freelance project & task management assistant app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^13.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.2.1
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  flutter_local_notifications: ^16.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
